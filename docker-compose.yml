services: 
  live_data_generator:
    build:
      context: .
      dockerfile: python_caller.dockerfile
    depends_on: # it will wait for mongoDB to be running
      - mongoDB
  mongoDB:
    image: mongo:7
    container_name: sentinel-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes: 
      - mongodb_data:/data/db
  redis:
    image: redis:7
    container_name: sentinel-redis
    restart: always
    ports:
      - "6379:6379" 
  qdrant:
    image: qdrant/qdrant
    container_name: sentinel-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes: 
      - qdrant_data:/qdrant/storage
  ollama:
    image: ollama/ollama
    container_name: sentinel-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes: 
  mongodb_data:
  qdrant_data:
  ollama_data:
